name: Build Cost Notifier Lambda Container

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  actions: read
  checks: write
  contents: write
  deployments: none
  issues: none
  packages: none
  pull-requests: write
  repository-projects: none
  security-events: write
  statuses: none

defaults:
 run:
  shell: bash

jobs:
  version:
    name: Create Version & Tag
    uses: ./.github/workflows/version.yml

  build-containers:
    name: "Test & Build Lambda Images"
    needs: [version]
    runs-on: ubuntu-latest
    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    outputs:
      tag: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test with pytest
        run: make test

      - name: Build Container
        run: make build

      - name: Configure OIDC AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::311462405659:role/aws-cost-notifier-oidc-role
          role-session-name: opg-aws-cost-notifier-github-actions-push
          role-duration-seconds: 900
          aws-region: eu-west-1

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4
        with:
          registries: 311462405659

      - name: Snyk Scan
        uses: ministryofjustice/opg-github-actions/actions/snyk-scan@9e8b7c2fb29c11e77b12913f74459fa48b11829f # v4.8.2
        with:
          SNYK_TEST_IMAGE: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-cost-notifier:latest
          SNYK_TOKEN: ${{ secrets.SNYK_OPG_ORG_TOKEN }}

      - name: Upload Snyk scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always()
        with:
          sarif_file: 'test-results/snyk.sarif'

      - name: Push Container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          COST_NOTIFIER_ECR_REPOSITORY: shared/aws-cost-notifier
        run: |
          docker tag 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-cost-notifier:latest $ECR_REGISTRY/$COST_NOTIFIER_ECR_REPOSITORY:${{ needs.version.outputs.tag }}
          if ${{ github.ref_name == 'main' }}
          then
            docker tag 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-cost-notifier:latest $ECR_REGISTRY/$COST_NOTIFIER_ECR_REPOSITORY:main-${{ needs.version.outputs.tag }}
            docker tag 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-cost-notifier:latest $ECR_REGISTRY/$COST_NOTIFIER_ECR_REPOSITORY:main-${{ needs.version.outputs.tag }}-${{ needs.version.outputs.timestamp }}
            # We want all of the tags pushed
            docker push --all-tags $ECR_REGISTRY/$COST_NOTIFIER_ECR_REPOSITORY
          else
            docker push $ECR_REGISTRY/$COST_NOTIFIER_ECR_REPOSITORY:${{ needs.version.outputs.tag }}
          fi

      - name: Put Tag
        if: github.ref == 'refs/heads/main'
        run: aws ssm put-parameter --region "eu-west-1" --name "/shared/aws-cost-notifier-lambda-version" --type "String" --value "${{ needs.version.outputs.tag }}" --overwrite
