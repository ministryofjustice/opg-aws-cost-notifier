services:
  aws-cost-notifier:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/shared/aws-cost-notifier:latest
    build:
      context: ./lambda
  pytest:
    image: aws-cost-notifer-pytest:latest
    build:
      context: ./lambda
      dockerfile: pytest.Dockerfile
    volumes:
      - ./lambda:/app
    command: pytest
